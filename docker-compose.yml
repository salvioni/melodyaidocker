services:
  melody-ai:
    build:
      context: .
      dockerfile: Dockerfile
    image: melody-ai:latest
    container_name: melody-ai
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - MELODY_DEVICE=auto
      - MELODY_SEPARATION_BACKEND=auto
      - TEMP_DIR=/tmp/melody
      # Set your Supabase credentials here or in a .env file:
      # - SUPABASE_URL=https://xxxx.supabase.co
      # - SUPABASE_SERVICE_ROLE_KEY=your-key
    volumes:
      - melody-tmp:/tmp/melody        # persistent scratch space for audio
      - melody-models:/root/.cache    # cache downloaded AI models between restarts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

    # ── GPU support (NVIDIA) ──────────────────────────────────────────────────
    # Uncomment the block below if you have an NVIDIA GPU + nvidia-container-toolkit installed.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  melody-tmp:
  melody-models:
